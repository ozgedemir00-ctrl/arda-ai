<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDA AI - SECURITY PANEL</title>
    <style>
        body { background-color: #06090f; color: #2ea44f; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #238636; padding: 40px; border-radius: 12px; text-align: center; background-color: #0d1117; box-shadow: 0 0 20px rgba(35,134,54,0.5); width: 90%; max-width: 400px; }
        input { padding: 12px; background: #06090f; border: 1px solid #30363d; color: #58a6ff; text-align: center; font-size: 16px; border-radius: 6px; margin-bottom: 15px; width: 90%; font-weight: bold; }
        button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #2ea44f; }
        .success-panel { color: #58a6ff; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="login-screen">
            <h2>🔒 ARDA AI SYSTEM</h2>
            <p>Sisteme erişmek için giriş kodunu yazın:</p>
            <input type="password" id="sifre-kutusu" placeholder="••••••••">
            <br>
            <button onclick="sistemeGir()">SİSTEME GİRİŞ YAP</button>
        </div>

        <div id="secret-screen" class="success-panel">
            <h2>👑 ERİŞİM ONAYLANDI</h2>
            <p style="color: #8b949e;">ARDA AI Ana Veri Merkezine Bağlandınız.</p>
            <hr style="border-color: #30363d;">
            <p style="color: white; font-size: 18px;">🔥 Proje Başarıyla Tamamlandı! 🔥</p>
            <p>Artık tüm dünyaya açık, siber korumalı bir siten var.</p>
        </div>
    </div>

    <script>
        function sistemeGir() {
            var girilenSifre = document.getElementById("sifre-kutusu").value;
            // Belirlediğin özel giriş kodu
            if(girilenSifre === "ARDA-2026-PRO") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("secret-screen").style.display = "block";
            } else {
                alert("🚨 YETKİSİZ ERİŞİM! Şifre hatalı, sistem kilitlendi.");
            }
        }
    </script>

</body>
</html>
