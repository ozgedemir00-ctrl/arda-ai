<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDA AI</title>
    <style>
        /* Gemini Tarzı Arka Plan ve Renkler */
        body { 
            background-color: #131314; /* Gemini koyu gri arka planı */
            color: #e3e3e3; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        /* Yapay Zeka Kontrol Kutusu */
        .ai-container { 
            background-color: #1e1e20; /* Hafif açık panel rengi */
            border: 1px solid #303135; 
            padding: 40px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        /* Gemini Mavisi Parlayan Logo Efekti */
        .ai-logo {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(45deg, #4285f4, #9b51e0, #e8710a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .status-text {
            color: #9aa0a6;
            font-size: 14px;
            margin-bottom: 30px;
        }
        /* Giriş Butonu */
        .ai-btn {
            background: linear-gradient(90deg, #1a73e8, #4285f4);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 100px; /* Yuvarlak modern buton */
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .ai-btn:hover {
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.4);
        }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="ai-logo">✨ ARDA AI OS</div>
        <p class="status-text">Yapay Zeka Çirdeği ve Siber Kontrol Merkezi</p>
        
        <div style="margin: 20px 0; color: #34a853; font-weight: bold;">
            ● SİSTEM ÇEVRİMİÇİ
        </div>

        <button class="ai-btn">KONTROL PANELİNİ AÇ</button>
    </div>

</body>
</html>
